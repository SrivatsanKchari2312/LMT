# ============================================================================
# Alertmanager Configuration
# ============================================================================
# File:    /etc/alertmanager/alertmanager.yml
# Reload:  sudo systemctl reload alertmanager
# Validate: amtool check-config alertmanager.yml
#
# Replace the SMTP and recipient placeholders with real values.
# For Gmail: enable 2FA, then create an App Password at
#   https://myaccount.google.com/apppasswords
# ============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'your_project_email@gmail.com'
  smtp_auth_username: 'your_project_email@gmail.com'
  smtp_auth_password: 'your_16_char_app_password'
  smtp_require_tls: true

route:
  receiver: 'team-email'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: 'team-email'
    email_configs:
      - to: 'team-oncall@example.com'
        send_resolved: true

# ============================================================================
# Alternative: Webhook receiver (for Slack / Discord / custom endpoint)
# Uncomment below and comment out the email receiver above to use.
# ============================================================================
# receivers:
#   - name: 'team-webhook'
#     webhook_configs:
#       - url: 'https://your-webhook-url-here'
#         send_resolved: true
