groups:
  - name: prometheus_self
    rules:
      - alert: ConfigReloadFailure
        expr: prometheus_config_last_reload_successful == 0
        labels:
          severity: critical
        annotations:
          summary: "Prometheus config reload failed"
          description: "The last prometheus.yml reload failed. Check: promtool check config /etc/prometheus/prometheus.yml"

      - alert: ScrapeErrorsIncreasing
        expr: increase(scrape_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Scrape errors increasing on job {{ $labels.job }}"
          description: "Prometheus is encountering scrape errors. Check target connectivity."

      - alert: AlertmanagerNotReachable
        expr: prometheus_notifications_alertmanagers_discovered < 1
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager not reachable"
          description: "Prometheus cannot reach any Alertmanager. Alerts will not be delivered."

      - alert: TSDBCompactionFailures
        expr: increase(prometheus_tsdb_compactions_failed_total[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus TSDB compaction failures"
          description: "Prometheus TSDB experienced compaction failures. Check disk space and permissions."
