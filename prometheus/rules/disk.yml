groups:
  - name: disk_alerts
    rules:
      - alert: LowDiskWarning
        expr: >
          (node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"}
          - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"})
          / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"} * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full (threshold: 80%)."

      - alert: LowDiskCritical
        expr: >
          (node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"}
          - node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"})
          / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"} * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% full (threshold: 95%)."

      - alert: DiskFillingFast
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"}[1h], 4*3600) < 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk filling fast on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} predicted to run out of space within 4 hours."

      - alert: InodeExhaustionWarning
        expr: >
          (node_filesystem_files{fstype!~"tmpfs|devtmpfs"}
          - node_filesystem_files_free{fstype!~"tmpfs|devtmpfs"})
          / node_filesystem_files{fstype!~"tmpfs|devtmpfs"} * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High inode usage on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Inode usage on {{ $labels.mountpoint }} is {{ $value | printf \"%.1f\" }}% (threshold: 80%)."

      - alert: HighDiskReadLatency
        expr: >
          rate(node_disk_read_time_seconds_total[5m])
          / rate(node_disk_reads_completed_total[5m]) > 0.1
          and rate(node_disk_reads_completed_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High disk read latency on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} read latency is {{ $value | printf \"%.3f\" }}s (threshold: 100ms)."

      - alert: HighDiskWriteLatency
        expr: >
          rate(node_disk_write_time_seconds_total[5m])
          / rate(node_disk_writes_completed_total[5m]) > 0.1
          and rate(node_disk_writes_completed_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High disk write latency on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} write latency is {{ $value | printf \"%.3f\" }}s (threshold: 100ms)."
